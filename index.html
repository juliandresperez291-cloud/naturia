<html lang="es">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #060d1a;
  --surface: #0d1b2e;
  --surface2: #0f2040;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f4ff;
  --text2: #8fa3c0;
  --text3: #4a6380;
  --teal: #00d4a8;
  --teal2: #00a882;
  --teal3: #005c47;
  --teal-glow: rgba(0,212,168,0.15);
  --amber: #f5a623;
  --purple: #9b7fea;
  --coral: #ff6b6b;
  --blue: #4d9ef5;
  --font-display: 'Sora', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--text);
  overscroll-behavior: none;
  min-height: 100dvh;
}

#root { min-height: 100dvh; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--teal3); border-radius: 3px; }

/* ── Animations ── */
@keyframes fadeUp    { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
@keyframes scaleIn   { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
@keyframes orbFloat  { 0%,100% { transform:translateY(0) scale(1); } 50% { transform:translateY(-20px) scale(1.05); } }
@keyframes orbFloat2 { 0%,100% { transform:translateY(0) scale(1); } 50% { transform:translateY(16px) scale(0.97); } }
@keyframes blink     { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
@keyframes spin      { to { transform:rotate(360deg); } }
@keyframes shimmer   { from { background-position:-200% 0; } to { background-position:200% 0; } }
@keyframes ripple    { from { transform:scale(0.8); opacity:0.6; } to { transform:scale(2.4); opacity:0; } }

.fade-up  { animation: fadeUp  0.45s cubic-bezier(0.16,1,0.3,1) both; }
.fade-in  { animation: fadeIn  0.3s ease both; }
.scale-in { animation: scaleIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }

/* ── Orbs ── */
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(60px); pointer-events: none; z-index: 0;
}
.orb-teal  { width:220px; height:220px; background:rgba(0,180,140,0.12); animation:orbFloat 8s ease-in-out infinite; }
.orb-blue  { width:160px; height:160px; background:rgba(77,158,245,0.08); animation:orbFloat2 10s ease-in-out infinite; }
.orb-amber { width:140px; height:140px; background:rgba(245,166,35,0.06); animation:orbFloat 12s ease-in-out infinite 2s; }

/* ── Glass card ── */
.glass {
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* ── Buttons ── */
button { cursor: pointer; border: none; outline: none; font-family: var(--font-body); transition: all 0.18s cubic-bezier(0.16,1,0.3,1); }
button:active { transform: scale(0.96); }

.btn-primary {
  background: linear-gradient(135deg, var(--teal2), var(--teal));
  color: #001a12; font-weight: 700;
  box-shadow: 0 4px 20px rgba(0,212,168,0.25), 0 1px 3px rgba(0,0,0,0.4);
}
.btn-primary:hover { box-shadow: 0 6px 28px rgba(0,212,168,0.4), 0 2px 4px rgba(0,0,0,0.4); }

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
}
.btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }

/* ── Nav ── */
.nav-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: rgba(6,13,26,0.92);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; justify-content: space-around;
  padding: 10px 0 max(14px, env(safe-area-inset-bottom, 14px));
  z-index: 200;
}

.nav-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 4px 16px;
  background: transparent; color: var(--text3);
  font-size: 10px; font-weight: 500; letter-spacing: 0.03em;
  font-family: var(--font-body);
  position: relative;
}
.nav-item.active { color: var(--teal); }
.nav-item.active::before {
  content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px; background: var(--teal); border-radius: 0 0 4px 4px;
}

/* ── Tags ── */
.tag {
  display: inline-flex; align-items: center;
  padding: 4px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  font-family: var(--font-display);
}

/* ── Chat ── */
.msg-user {
  background: linear-gradient(135deg, var(--teal3), #004a38);
  border: 1px solid rgba(0,212,168,0.2);
}
.msg-ai {
  background: var(--surface);
  border: 1px solid var(--border);
}

/* ── Typing dots ── */
.dot { width:7px; height:7px; border-radius:50%; background:var(--teal); }
.dot:nth-child(1) { animation: blink 1.2s ease infinite; }
.dot:nth-child(2) { animation: blink 1.2s ease infinite 0.2s; }
.dot:nth-child(3) { animation: blink 1.2s ease infinite 0.4s; }

/* ── Spinner ── */
.spinner { animation: spin 0.8s linear infinite; }

/* ── Glow dot ── */
.glow-dot {
  width:8px; height:8px; border-radius:50%; background:var(--teal);
  box-shadow: 0 0 8px var(--teal), 0 0 20px rgba(0,212,168,0.4);
  animation: blink 2s ease infinite;
}

/* ── Progress bar ── */
@keyframes progressFill { from { width: 0; } to { width: 100%; } }

input, textarea {
  font-family: var(--font-body);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
input:focus, textarea:focus { border-color: rgba(0,212,168,0.4); }
input::placeholder, textarea::placeholder { color: var(--text3); }

/* ── Step indicator ── */
.step-num {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family: var(--font-display); font-weight:700; font-size:14px;
  background: linear-gradient(135deg, var(--teal3), #002a1e);
  border: 1px solid rgba(0,212,168,0.3);
  color: var(--teal); flex-shrink:0;
  box-shadow: 0 0 12px rgba(0,212,168,0.15);
}
</style>
</head>

/* ─────────── API ─────────── */
async function askClaude(messages, station) {
  const systemPrompt = `Eres NaturIA, un asistente educativo de Ciencias Naturales para estudiantes colombianos de secundaria. 
${station ? `Estación actual: ${station.title} (${station.sub}). Temas: ${station.concepts.join(', ')}.` : 'Puedes responder sobre genética, química, ecosistemas y física.'}
Responde SIEMPRE en español. Sé didáctico, entusiasta y claro. Usa analogías cotidianas y ejemplos de Colombia cuando sea relevante.
Mantén respuestas concisas (máximo 180 palabras). Termina siempre con una pregunta para motivar la curiosidad.
Usa emojis con moderación para hacer el texto más amigable.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'anthropic-version':'2023-06-01' },
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:systemPrompt, messages })
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.content?.[0]?.text || 'No pude generar una respuesta. Intenta de nuevo.';
}

function ChatScreen({ initialStation }) {
  const welcome = initialStation
    ? `¡Hola! Soy NaturIA 🌿\n\nEstoy especializado en ${initialStation.sub} para ti. Puedo explicarte ${initialStation.concepts.slice(0,2).join(', ')} y mucho más.\n\n¿Cuál es tu pregunta?`
    : '¡Hola! Soy NaturIA 🌿\n\nSoy tu asistente de Ciencias Naturales con IA real. Puedo ayudarte con genética, química, ecosistemas, física y más.\n\n¿Qué quieres explorar hoy?';

  const [messages, setMessages] = useState([{ role:'assistant', content:welcome }]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [station, setStation] = useState(initialStation);
  const endRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  const send = async (text) => {
    const msg = (text || input).trim();
    if(!msg || loading) return;
    setInput('');
    const newMsgs = [...messages, { role:'user', content:msg }];
    setMessages(newMsgs);
    setLoading(true);
    try {
      const apiMsgs = newMsgs.map(m => ({ role:m.role, content:m.content }));
      const reply = await askClaude(apiMsgs, station);
      setMessages(prev => [...prev, { role:'assistant', content:reply }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:'assistant', content:'🔌 Error de conexión. Verifica que la API key esté configurada e intenta de nuevo.' }]);
    }
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const suggestions = station
    ? [`¿Cómo funciona ${station.concepts[0]}?`, `Dame un ejemplo del mundo real`, `¿Por qué es importante en Colombia?`]
    : ['¿Qué es la fotosíntesis?', 'Explícame la herencia genética', '¿Cómo funciona la gravedad?'];

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100svh'}}>
      {/* Chat header */}
      <div style={{padding:'16px 20px', borderBottom:'1px solid var(--border)', background:'rgba(6,13,26,0.9)', backdropFilter:'blur(20px)', flexShrink:0}}>
        <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'12px'}}>
          <div style={{width:'40px', height:'40px', borderRadius:'12px', background:'linear-gradient(135deg,#004a38,#00a882)', border:'1px solid rgba(0,212,168,0.3)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', boxShadow:'0 4px 16px rgba(0,212,168,0.2)'}}>🌿</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--font-display)', fontWeight:'600', fontSize:'15px', color:'var(--text)'}}>NaturIA</div>
            <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
              <div className="glow-dot" style={{width:'6px', height:'6px'}}></div>
              <span style={{fontSize:'11px', color:'var(--teal)'}}>En línea · IA activa{station ? ' · '+station.sub : ''}</span>
            </div>
          </div>
        </div>
        {/* Topic filters */}
        <div style={{display:'flex', gap:'6px', overflowX:'auto', paddingBottom:'4px', scrollbarWidth:'none'}}>
          <button className="btn" onClick={() => setStation(null)} style={{padding:'5px 12px', borderRadius:'20px', fontSize:'11px', fontWeight:'500', whiteSpace:'nowrap', background:!station?'rgba(0,212,168,0.15)':'transparent', border:`1px solid ${!station?'rgba(0,212,168,0.4)':'var(--border)'}`, color:!station?'var(--teal)':'var(--text3)'}}>
            🌐 General
          </button>
          {STATIONS.map(s => (
            <button key={s.id} className="btn" onClick={() => setStation(s)} style={{padding:'5px 12px', borderRadius:'20px', fontSize:'11px', fontWeight:'500', whiteSpace:'nowrap', background:station?.id===s.id?s.accentDim:'transparent', border:`1px solid ${station?.id===s.id?s.accentBorder:'var(--border)'}`, color:station?.id===s.id?s.accent:'var(--text3)'}}>
              {s.emoji} {s.sub}
            </button>
          ))}
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1, overflowY:'auto', padding:'20px 16px', display:'flex', flexDirection:'column', gap:'14px', paddingBottom:'6px'}}>
        {messages.map((m,i) => (
          <div key={i} className="fade-up" style={{display:'flex', justifyContent:m.role==='user'?'flex-end':'flex-start', gap:'8px', animationDelay:`${Math.min(i,3)*0.05}s`}}>
            {m.role==='assistant' && (
              <div style={{width:'32px', height:'32px', borderRadius:'10px', background:'linear-gradient(135deg,#004a38,#00a882)', border:'1px solid rgba(0,212,168,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', flexShrink:0, marginTop:'2px'}}>🌿</div>
            )}
            <div className={m.role==='user'?'msg-user':'msg-ai'} style={{maxWidth:'78%', padding:'12px 16px', borderRadius:m.role==='user'?'18px 18px 6px 18px':'18px 18px 18px 6px'}}>
              <p style={{fontSize:'13px', lineHeight:'1.7', whiteSpace:'pre-wrap', color:'var(--text)', fontFamily:'var(--font-body)'}}>{m.content}</p>
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:'flex', gap:'8px', alignItems:'flex-start'}}>
            <div style={{width:'32px', height:'32px', borderRadius:'10px', background:'linear-gradient(135deg,#004a38,#00a882)', border:'1px solid rgba(0,212,168,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', flexShrink:0}}>🌿</div>
            <div className="msg-ai" style={{padding:'14px 18px', borderRadius:'18px 18px 18px 6px', display:'flex', gap:'5px', alignItems:'center'}}>
              <div className="dot"></div><div className="dot"></div><div className="dot"></div>
            </div>
          </div>
        )}
        <div ref={endRef}></div>
      </div>

      {/* Suggestions */}
      {messages.length <= 1 && (
        <div style={{padding:'0 16px 8px', display:'flex', gap:'8px', overflowX:'auto', scrollbarWidth:'none', flexShrink:0}}>
          {suggestions.map((s,i) => (
            <button key={i} className="btn glass" onClick={() => send(s)} style={{fontSize:'12px', padding:'8px 14px', borderRadius:'20px', color:'var(--text2)', whiteSpace:'nowrap', flexShrink:0, border:'1px solid var(--border2)'}}>
              {s}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{padding:'12px 16px', borderTop:'1px solid var(--border)', background:'rgba(6,13,26,0.9)', backdropFilter:'blur(20px)', display:'flex', gap:'10px', alignItems:'flex-end', paddingBottom:'max(12px,env(safe-area-inset-bottom,12px))', flexShrink:0}}>
        <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }}}
          placeholder="Escribe tu pregunta científica…"
          rows={1} style={{flex:1, borderRadius:'14px', padding:'11px 16px', fontSize:'13px', resize:'none', lineHeight:'1.5', maxHeight:'100px'}}/>
        <button className="btn" onClick={() => send()} disabled={!input.trim()||loading}
          style={{width:'44px', height:'44px', borderRadius:'13px', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center',
          background:input.trim()&&!loading?'linear-gradient(135deg,#00a882,#00d4a8)':'var(--surface)',
          border:`1px solid ${input.trim()&&!loading?'rgba(0,212,168,0.3)':'var(--border)'}`,
          boxShadow:input.trim()&&!loading?'0 4px 16px rgba(0,212,168,0.25)':'none',
          opacity:input.trim()||loading?1:0.5}}>
          {loading
            ? <svg className="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00d4a8" strokeWidth="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            : <span style={{color:'#001a12', fontSize:'18px', fontWeight:'700'}}>↑</span>}
        </button>
      </div>
    </div>
  );
}

/* META */
function MetaScreen() {
  const [open, setOpen] = useState(null);
  const ethics = [
    { q:'¿La IA siempre tiene razón?', a:'No. La IA puede generar errores o información incorrecta ("alucinaciones"). Siempre verifica con fuentes confiables como libros, docentes o sitios científicos.', icon:'⚠️' },
    { q:'¿La IA reemplaza al profesor?', a:'No. El docente aporta experiencia, contexto humano y guía personalizada. La IA es una herramienta de apoyo, no un sustituto.', icon:'👨‍🏫' },
    { q:'¿Qué aprendemos al usar IA?', a:'Aprendemos a hacer mejores preguntas, a pensar críticamente y a validar información de forma científica. Esas son habilidades del siglo XXI.', icon:'💡' }
  ];
  return (
    <div style={{padding:'24px 20px 90px', minHeight:'100svh', position:'relative'}}>
      <Orbs colors={['rgba(245,166,35,0.08)','rgba(0,180,140,0.08)','']}/>
      <div style={{position:'relative',zIndex:1}}>
        <div style={{marginBottom:'24px'}}>
          <h2 style={{fontFamily:'var(--font-display)', fontSize:'22px', fontWeight:'700', color:'var(--text)', marginBottom:'6px'}}>Metacognición</h2>
          <p style={{fontSize:'13px', color:'var(--text2)'}}>Aprende a aprender con IA de forma crítica</p>
        </div>

        {/* Steps */}
        <div style={{position:'relative', marginBottom:'24px'}}>
          <div style={{position:'absolute', left:'17px', top:'36px', bottom:'36px', width:'2px', background:'linear-gradient(to bottom, rgba(0,212,168,0.3), rgba(0,212,168,0.05))', borderRadius:'2px'}}></div>
          <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
            {META_STEPS.map((s,i) => (
              <div key={i} className="glass fade-up" style={{animationDelay:`${i*0.08}s`, borderRadius:'var(--r-lg)', padding:'18px 18px 18px 14px', border:'1px solid var(--border)', cursor:'pointer'}} onClick={() => setOpen(open===i?null:i)}>
                <div style={{display:'flex', alignItems:'center', gap:'14px'}}>
                  <div className="step-num">{s.n}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'10px', color:'var(--teal)', fontWeight:'600', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:'2px'}}>Paso {s.n}</div>
                    <div style={{fontFamily:'var(--font-display)', fontWeight:'600', fontSize:'14px', color:'var(--text)'}}>{s.label}</div>
                  </div>
                  <span style={{color:'var(--text3)', fontSize:'18px', transform:open===i?'rotate(90deg)':'none', transition:'transform 0.2s'}}>{s.icon}</span>
                </div>
                {open===i && (
                  <div className="fade-in" style={{marginTop:'14px', paddingTop:'14px', borderTop:'1px solid var(--border)'}}>
                    <p style={{fontSize:'13px', color:'var(--text2)', lineHeight:'1.7', marginBottom:'10px'}}>{s.desc}</p>
                    <div style={{background:'rgba(0,212,168,0.06)', border:'1px solid rgba(0,212,168,0.15)', borderRadius:'10px', padding:'12px 14px'}}>
                      <div style={{fontSize:'10px', color:'var(--teal)', fontWeight:'600', letterSpacing:'0.06em', marginBottom:'4px'}}>EJEMPLO</div>
                      <p style={{fontSize:'12px', color:'var(--text2)', lineHeight:'1.6', fontStyle:'italic'}}>{s.example}</p>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Ethics */}
        <div className="glass fade-up" style={{borderRadius:'var(--r-lg)', padding:'20px', border:'1px solid var(--border)', animationDelay:'0.35s'}}>
          <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'18px'}}>
            <div style={{width:'36px', height:'36px', borderRadius:'10px', background:'rgba(245,166,35,0.12)', border:'1px solid rgba(245,166,35,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px'}}>⚖️</div>
            <h3 style={{fontFamily:'var(--font-display)', fontSize:'14px', fontWeight:'700', color:'var(--text)'}}>Uso Ético de la IA</h3>
          </div>
          {ethics.map((e,i) => (
            <div key={i} style={{marginBottom:i<ethics.length-1?'16px':0, paddingBottom:i<ethics.length-1?'16px':0, borderBottom:i<ethics.length-1?'1px solid var(--border)':'none'}}>
              <div style={{display:'flex', alignItems:'flex-start', gap:'10px', marginBottom:'6px'}}>
                <span style={{fontSize:'14px'}}>{e.icon}</span>
                <div style={{fontFamily:'var(--font-display)', fontWeight:'600', fontSize:'13px', color:'var(--text)'}}>{e.q}</div>
              </div>
              <p style={{fontSize:'12px', color:'var(--text2)', lineHeight:'1.6', paddingLeft:'24px'}}>{e.a}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* NAVIGATION */
const NAV = [
  { icon:'⌂', label:'Inicio', v:'home' },
  { icon:'🔭', label:'Estaciones', v:'stations' },
  { icon:'💬', label:'Chat IA', v:'chat' },
  { icon:'🧠', label:'Pensar', v:'meta' }
];

/* MAIN APP */
function App() {
  const [view, setView] = useState('home');
  const [selStation, setSelStation] = useState(null);
  const [chatStation, setChatStation] = useState(null);

  const navTo = (v) => {
    if(v !== 'chat') setChatStation(null);
    setSelStation(null);
    setView(v);
  };

  const activeNav = view === 'station-detail' ? 'stations' : view;

  return (
    <div style={{maxWidth:'430px', margin:'0 auto', background:'var(--bg)', minHeight:'100svh', position:'relative'}}>
      <div style={{height:'100svh', overflow:view==='chat'?'hidden':'auto', paddingBottom:view==='chat'?0:'0'}}>
        {view==='home' && <HomeScreen onNav={navTo}/>}
        {view==='stations' && <StationsScreen onSelect={s => { setSelStation(s); setView('station-detail'); }}/>}
        {view==='station-detail' && selStation && <StationDetail station={selStation} onBack={() => setView('stations')} onChat={s => { setChatStation(s); setView('chat'); }}/>}
        {view==='chat' && <ChatScreen initialStation={chatStation} key={chatStation?.id||'g'}/>}
        {view==='meta' && <MetaScreen/>}
      </div>

      {view !== 'chat' && (
        <nav className="nav-bar">
          {NAV.map(n => (
            <button key={n.v} className={`btn nav-item ${activeNav===n.v?'active':''}`} onClick={() => navTo(n.v)}>
              <span style={{fontSize:'22px'}}>{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
